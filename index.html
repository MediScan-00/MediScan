    <script>
      /* 
        SENTRY SETUP:
        1. Go to sentry.io → Sign up free
        2. New Project → Browser JavaScript
        3. Copy your DSN
        4. Replace "PASTE_YOUR_SENTRY_DSN_HERE" above
        5. Done — errors will appear in your dashboard
      */
      Sentry.init({
        dsn: "PASTE_YOUR_SENTRY_DSN_HERE",
        environment: "production",
        release: "mediscan@1.0.0",
        tracesSampleRate: 0.2,
        beforeSend(event) {
          // Remove any personal health data before sending
          if (event.extra) {
            delete event.extra.email
            delete event.extra.medications
          }
          return event
        }
      })
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=PASTE_YOUR_GA4_ID_HERE"></script>
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag(){dataLayer.push(arguments)}
      gtag('js', new Date())
      gtag('config', 'PASTE_YOUR_GA4_ID_HERE', {
        anonymize_ip: true,
        allow_google_signals: false
      })

      window.analytics_track = function(eventName, params = {}) {
        if (typeof gtag === 'undefined') return
        var userPlan = 'anonymous'
        try {
          var userStr = localStorage.getItem('dt_user')
          if (userStr) {
            userPlan = JSON.parse(userStr).plan || 'anonymous'
          }
        } catch(e){}
        gtag('event', eventName, Object.assign({
          app_name: 'mediscan',
          user_plan: userPlan
        }, params))
      }
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        const swCode = `
          const CACHE = 'mediscan-v1'
          const ASSETS = ['/']
          
          self.addEventListener('install', e => {
            e.waitUntil(
              caches.open(CACHE)
                .then(cache => cache.addAll(ASSETS))
            )
          })
          
          self.addEventListener('fetch', e => {
            e.respondWith(
              caches.match(e.request)
                .then(cached => cached || fetch(e.request))
            )
          })
        `
        
        const blob = new Blob([swCode], { type: 'application/javascript' })
        const swUrl = URL.createObjectURL(blob)
        
        navigator.serviceWorker.register(swUrl)
          .then(() => console.log('SW registered'))
          .catch(err => console.log('SW failed:', err))
      }
    </script>
